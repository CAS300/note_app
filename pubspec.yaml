name: note_app
description: "A Windows desktop note-taking application with multi-database support."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqlite3: ^2.4.2
  sqlite3_flutter_libs: ^0.5.21
  file_picker: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  emoji_picker_flutter: ^3.1.0
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  msix: ^3.7.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 256
  macos:
    generate: false
  web:
    generate: false

msix_config:
  display_name: "Note App"
  publisher_display_name: "MyPublisher" # PLACEHOLDER
  identity_name: "YourPublisher.NoteApp" # PLACEHOLDER
  msix_version: "1.0.0.0"
  logo_path: "assets/icons/app_icon.png"
  capabilities: "internetClient"
  # To sign the app, uncomment and fill out:
  # certificate_path: "path/to/certificate.pfx" # PLACEHOLDER
  # certificate_password: "YOUR_PASSWORD" # PLACEHOLDER
