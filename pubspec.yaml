name: note_app
description: "A Windows desktop note-taking application with multi-database support."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqlite3: ^2.4.2
  sqlite3_flutter_libs: ^0.5.21
  file_picker: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
